# SonarQube Configuration for i27 Helpdesk UI
sonar.projectKey=i27-helpdesk-ui
sonar.projectName=i27 Helpdesk UI
sonar.projectVersion=1.0.0

# Source code directories
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.*,**/*.spec.*

# Language
sonar.language=ts

# Test coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.spec.js,**/*.spec.ts

# Code quality gates
sonar.qualitygate.wait=true

# Additional settings
sonar.sourceEncoding=UTF-8